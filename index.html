<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #2b0a3d;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

#gameGrid {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(20, 1fr);
    grid-template-rows: repeat(12, 1fr);
    z-index: 0;
}

.tile {
    border: 1px solid rgba(184,77,255,0.15);
    background: transparent;
}

.tile.revealed {
    background: rgba(184,77,255,0.25);
}

.tile.bomb {
    background: red;
}

.line-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;

    background-image:
        linear-gradient(rgba(184,77,255,0.9) 1px, transparent 1px),
        linear-gradient(90deg, rgba(184,77,255,0.9) 1px, transparent 1px);

    background-size: calc(100% / 20) calc(100% / 12);

    mask-image: radial-gradient(
        70px circle at var(--x) var(--y),
        black 85%,
        transparent 100%
    );

    -webkit-mask-image: radial-gradient(
        70px circle at var(--x) var(--y),
        black 85%,
        transparent 100%
    );

    z-index: 1;
}

.mouse-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;

    background: radial-gradient(
        80px circle at var(--x) var(--y),
        rgba(184, 77, 255, 0.18),
        transparent 70%
    );

    z-index: 1;
}

.container {
    text-align: center;
    z-index: 2;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
}

h1, p {
    margin: 0;
    animation: float 4s ease-in-out infinite;
}

h1 { font-size: 40px; }

p {
    opacity: 0.8;
    margin-top: 10px;
}

#workButton {
    margin-top: 30px;
    position: relative;
    padding: 14px 28px;
    font-size: 18px;
    color: white;
    background: transparent;
    border: 2px solid #b84dff;
    border-radius: 8px;
    cursor: pointer;
    overflow: hidden;
    box-shadow: 0 0 20px #b84dff;
    transition: 0.3s ease;
}

#workButton:hover {
    box-shadow: 0 0 35px #b84dff, 0 0 60px #b84dff;
    transform: scale(1.05);
}

#workVideo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    z-index: 0;
}

.button-text {
    position: relative;
    z-index: 1;
}

.arrow {
    margin-left: 8px;
}

/* Moblie side */

@media (max-width: 768px) {

    #gameGrid {
        --cellSize: calc(100vw / 18);
        grid-template-columns: repeat(20, var(--cellSize));
        grid-template-rows: repeat(12, var(--cellSize));
        width: calc(var(--cellSize) * 20);
        height: calc(var(--cellSize) * 12);
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
    }

    .line-glow {
        background-size: var(--cellSize) var(--cellSize);
    }

}

    h1 { font-size: 32px; }
    p { font-size: 16px; }

    #workButton {
        font-size: 20px;
        padding: 16px 32px;
    }

    #workVideo {
        display: block;
        pointer-events: none;
    }
}

</style>
</head>

<body>

<div id="gameGrid"></div>
<div class="line-glow"></div>
<div class="mouse-glow"></div>

<div class="container">
    <h1 id="name"></h1>
    <p id="desc"></p>

    <button id="workButton">
        <video id="workVideo" src="skit.mp4" muted playsinline loop></video>
        <span class="button-text">Work <span class="arrow">→</span></span>
    </button>
</div>

<script>
const root = document.documentElement;

document.addEventListener("mousemove", (e) => {
    root.style.setProperty("--x", e.clientX + "px");
    root.style.setProperty("--y", e.clientY + "px");
});

function typeWriter(element, text, speed) {
    element.textContent = "";
    let i = 0;
    function type() {
        if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            setTimeout(type, speed);
        }
    }
    type();
}

window.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
        typeWriter(document.getElementById("name"), "EncrypticHD", 180);
        setTimeout(() => {
            typeWriter(
                document.getElementById("desc"),
                "Developer • Programmer • Builder",
                120
            );
        }, 1600);
    }, 300);

    if (window.innerWidth <= 768) {
        const video = document.getElementById("workVideo");
        video.play().catch(() => {});
    }
});

const rows = 12;
const cols = 20;
const bombCount = 40;

const gameGrid = document.getElementById("gameGrid");
let board = [];

function createBoard() {
    gameGrid.innerHTML = "";
    board = [];

    for (let i = 0; i < rows * cols; i++) {
        board.push({ bomb: false });

        const tile = document.createElement("div");
        tile.classList.add("tile");

        tile.addEventListener("click", () => revealTile(i, tile));

        gameGrid.appendChild(tile);
    }

    let placed = 0;
    while (placed < bombCount) {
        let index = Math.floor(Math.random() * board.length);
        if (!board[index].bomb) {
            board[index].bomb = true;
            placed++;
        }
    }
}

function revealTile(index, tile) {
    if (board[index].bomb) {
        tile.classList.add("bomb");
        setTimeout(() => createBoard(), 400);
        return;
    }
    tile.classList.add("revealed");
}

createBoard();

const button = document.getElementById("workButton");
const video = document.getElementById("workVideo");

button.addEventListener("mouseenter", () => {
    if (window.innerWidth > 768) {
        video.style.display = "block";
        video.play();
    }
});

button.addEventListener("mouseleave", () => {
    if (window.innerWidth > 768) {
        video.pause();
        video.currentTime = 0;
        video.style.display = "none";
    }
});
</script>

</body>
</html>
