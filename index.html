<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
:root {
    --x: -200px;
    --y: -200px;
}

body {
    margin: 0;
    height: 100vh;
    background: #2b0a3d;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

#gameGrid {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(20, 1fr);
    grid-template-rows: repeat(12, 1fr);
    z-index: 0;
}

.tile {
    border: 1px solid rgba(184,77,255,0.15);
    background: transparent;
}

.tile.revealed {
    background: rgba(184,77,255,0.25);
}

.tile.bomb {
    background: red;
}

.line-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
        linear-gradient(rgba(184,77,255,0.9) 1px, transparent 1px),
        linear-gradient(90deg, rgba(184,77,255,0.9) 1px, transparent 1px);
    background-size: calc(100% / 20) calc(100% / 12);
    mask-image: radial-gradient(
        70px circle at var(--x) var(--y),
        black 85%,
        transparent 100%
    );
    -webkit-mask-image: radial-gradient(
        70px circle at var(--x) var(--y),
        black 85%,
        transparent 100%
    );
    z-index: 1;
}

.mouse-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(
        80px circle at var(--x) var(--y),
        rgba(184, 77, 255, 0.18),
        transparent 70%
    );
    z-index: 1;
}

.container {
    text-align: center;
    z-index: 2;
}

@keyframes floatBox {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

@keyframes floatText {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
}

h1, p {
    margin: 0;
    animation: floatText 4s ease-in-out infinite;
}

h1 { font-size: 40px; }

p {
    opacity: 0.8;
    margin-top: 10px;
}

#workButton {
    margin-top: 30px;
    position: relative;
    padding: 14px 28px;
    font-size: 18px;
    color: white;
    background: transparent;
    border: 2px solid #b84dff;
    border-radius: 8px;
    cursor: pointer;
    overflow: hidden;
    box-shadow: 0 0 20px #b84dff;
    transition: 0.3s ease;
}

#workButton:hover {
    box-shadow: 0 0 35px #b84dff, 0 0 60px #b84dff;
    transform: scale(1.05);
}

#workVideo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    z-index: 0;
}

.button-text {
    position: relative;
    z-index: 1;
}

.arrow {
    margin-left: 8px;
}

.funfact-wrapper {
    position: fixed;
    left: clamp(12px, 2.5vw, 40px);
    top: clamp(14px, 9vh, 90px);
    width: clamp(240px, 26vw, 380px);
    height: calc(100vh - clamp(28px, 12vh, 140px));
    max-height: 620px;
    z-index: 3;
    animation: floatBox 7s ease-in-out infinite;
}

.funfact-box {
    position: absolute;
    inset: 0;
    background: rgba(30, 0, 45, 0.68);
    backdrop-filter: blur(10px);
    border-radius: 18px;
    padding: 18px;
    box-sizing: border-box;
    text-align: left;
    overflow: hidden;
}

.funfact-box h3 {
    margin: 0;
    font-size: clamp(16px, 1.2vw, 20px);
    color: #f0c9ff;
    letter-spacing: 0.5px;
    text-align: center;
}

.funfact-box .divider {
    height: 1px;
    width: 78%;
    margin: 10px auto 12px;
    background: rgba(184,77,255,0.65);
}

.funfact-content {
    height: calc(100% - 58px);
    overflow: auto;
    padding-right: 8px;
    scrollbar-width: thin;
    scrollbar-color: rgba(184,77,255,0.65) rgba(0,0,0,0);
}

.funfact-content::-webkit-scrollbar {
    width: 8px;
}

.funfact-content::-webkit-scrollbar-thumb {
    background: rgba(184,77,255,0.55);
    border-radius: 10px;
}

.funfact-content p {
    margin: 10px 0;
    font-size: clamp(12.5px, 0.95vw, 14px);
    line-height: 1.55;
    opacity: 0.92;
    animation: none;
}

.electric-border {
    position: absolute;
    inset: -6px;
    pointer-events: none;
    z-index: 4;
}

.electric-border rect {
    fill: none;
    stroke: rgba(184,77,255,1);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter:
        drop-shadow(0 0 2px rgba(184,77,255,0.95))
        drop-shadow(0 0 6px rgba(184,77,255,0.8));
    stroke-dasharray: 160 99999;
    animation: raceLoop 35s linear infinite;
    will-change: stroke-dashoffset;
}

@keyframes raceLoop {
    to { stroke-dashoffset: -99999; }
}

@media (max-width: 768px) {
    #gameGrid {
        --cellSize: calc(100vw / 18);
        grid-template-columns: repeat(20, var(--cellSize));
        grid-template-rows: repeat(12, var(--cellSize));
        width: calc(var(--cellSize) * 20);
        height: calc(var(--cellSize) * 12);
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
    }

    .line-glow {
        background-size: var(--cellSize) var(--cellSize);
    }

    h1 { font-size: 32px; }
    p { font-size: 16px; }

    #workButton {
        font-size: 20px;
        padding: 16px 32px;
    }

    #workVideo {
        display: block;
        pointer-events: none;
    }

    .funfact-wrapper {
        left: 10px;
        top: 10px;
        width: min(92vw, 360px);
        height: min(68vh, 520px);
    }
}
</style>
</head>

<body>

<div id="gameGrid"></div>
<div class="line-glow"></div>
<div class="mouse-glow"></div>

<div class="funfact-wrapper" id="funfactWrap">
    <svg class="electric-border" id="electricSvg" preserveAspectRatio="none"></svg>

    <div class="funfact-box">
        <h3>Fun Facts</h3>
        <div class="divider"></div>
        <div class="funfact-content" id="funFactContent"></div>
    </div>
</div>

<div class="container">
    <h1 id="name"></h1>
    <p id="desc"></p>

    <button id="workButton">
        <video id="workVideo" src="skit.mp4" muted playsinline loop></video>
        <span class="button-text">Work <span class="arrow">→</span></span>
    </button>
</div>

<script>
const root = document.documentElement;

document.addEventListener("mousemove", (e) => {
    root.style.setProperty("--x", e.clientX + "px");
    root.style.setProperty("--y", e.clientY + "px");
});

function typeWriter(element, text, speed) {
    element.textContent = "";
    let i = 0;
    function type() {
        if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            setTimeout(type, speed);
        }
    }
    type();
}

window.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
        typeWriter(document.getElementById("name"), "EncrypticHD", 180);
        setTimeout(() => {
            typeWriter(document.getElementById("desc"), "Developer • Programmer • Builder", 120);
        }, 1600);
    }, 300);

    if (window.innerWidth <= 768) {
        const video = document.getElementById("workVideo");
        video.play().catch(() => {});
    }

    syncElectricBorder();
    window.addEventListener("resize", syncElectricBorder);
});

const rows = 12;
const cols = 20;
const bombCount = 40;

const gameGrid = document.getElementById("gameGrid");
let board = [];

function createBoard() {
    gameGrid.innerHTML = "";
    board = [];

    for (let i = 0; i < rows * cols; i++) {
        board.push({ bomb: false });

        const tile = document.createElement("div");
        tile.classList.add("tile");

        tile.addEventListener("click", () => revealTile(i, tile));

        gameGrid.appendChild(tile);
    }

    let placed = 0;
    while (placed < bombCount) {
        let index = Math.floor(Math.random() * board.length);
        if (!board[index].bomb) {
            board[index].bomb = true;
            placed++;
        }
    }
}

function revealTile(index, tile) {
    if (board[index].bomb) {
        tile.classList.add("bomb");
        setTimeout(() => createBoard(), 400);
        return;
    }
    tile.classList.add("revealed");
}

createBoard();

const button = document.getElementById("workButton");
const video = document.getElementById("workVideo");

button.addEventListener("mouseenter", () => {
    if (window.innerWidth > 768) {
        video.style.display = "block";
        video.play();
    }
});

button.addEventListener("mouseleave", () => {
    if (window.innerWidth > 768) {
        video.pause();
        video.currentTime = 0;
        video.style.display = "none";
    }
});

const devFacts = [
    "Fun fact: LocalScripts only run on the client. UI, camera effects, and input handling belong there — but important stuff like currency, inventory, damage, or rewards must be validated on the server.",
    "Fun fact: RemoteEvents are the normal way to communicate client ↔ server. Assume the client can lie: clamp numbers, check distances, confirm ownership, verify cooldowns, and sanity-check everything server-side.",
    "Fun fact: StreamingEnabled helps big maps by loading nearby content. Avoid assuming far-away parts exist on the client, and build systems that work even if parts stream in late.",
    "Fun fact: TweenService is usually smoother and cheaper than updating CFrame every frame. Use it for doors, UI motion, levers, buttons, and simple animations.",
    "Fun fact: RenderStepped and Heartbeat run every frame — powerful but costly. Prefer events and state changes over constant per-frame loops whenever possible.",
    "Fun fact: CollectionService tags keep projects clean. Instead of searching the workspace, you can grab tagged objects instantly and keep logic organized.",
    "Fun fact: Object pooling improves performance. Reuse instances for projectiles, debris, pickups, and effects instead of constantly creating/destroying them.",
    "Fun fact: Leaderstats are mainly display. Store real values server-side and save through DataStores safely, then mirror values for the UI/leaderboard.",
    "Fun fact: DataStores can throttle. Wrap saves in pcall, don’t spam requests, and save on key moments like checkpoints, end of rounds, or player leaving.",
    "Fun fact: Too many unanchored parts can tank FPS. Anchor what you can, keep physics simple, and only simulate what truly needs to move."
];

const funFactContent = document.getElementById("funFactContent");
funFactContent.innerHTML = devFacts.map(t => `<p>${t}</p>`).join("");

function syncElectricBorder() {
    const wrap = document.getElementById("funfactWrap");
    const svg = document.getElementById("electricSvg");
    const r = wrap.getBoundingClientRect();
    const w = Math.max(1, Math.floor(r.width));
    const h = Math.max(1, Math.floor(r.height));
    svg.setAttribute("viewBox", `0 0 ${w} ${h}`);
    svg.setAttribute("width", w);
    svg.setAttribute("height", h);
    svg.innerHTML = `<rect x="8" y="8" width="${w - 16}" height="${h - 16}" rx="18" ry="18"></rect>`;
}
</script>

</body>
</html>
