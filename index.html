<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portfolio</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background-color: #2b0a3d;

    background-image:
        linear-gradient(rgba(255,255,255,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.07) 1px, transparent 1px);

    background-size: 60px 60px;

    font-family: Arial, sans-serif;
    color: white;

    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
}

.center {
    text-align: center;
    margin-top: 15vh;
}

h1 {
    font-size: 40px;
    margin: 0;
}

p {
    opacity: 0.8;
}

.bottom {
    width: 100%;
    text-align: center;
    padding-bottom: 40px;
}

#workButton {
    padding: 14px 28px;
    font-size: 18px;
    color: white;
    background: transparent;
    border: 2px solid #b84dff;
    border-radius: 8px;
    cursor: pointer;

    box-shadow: 0 0 15px #b84dff;

    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s ease;
}

#workButton:hover {
    box-shadow: 0 0 25px #b84dff, 0 0 40px #b84dff;
    transform: scale(1.05);
}

.show {
    animation: fadeInUp 0.8s forwards;
}

@keyframes fadeInUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.arrow {
    margin-left: 8px;
}

#videoContainer {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.7);
}

#skitVideo {
    width: 60%;
    max-width: 800px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="center">
    <h1>Your Name</h1>
    <p>Developer • Creator • Builder</p>
</div>

<div class="bottom">
    <button id="workButton">
        Work <span class="arrow">→</span>
    </button>
</div>

<div id="videoContainer">
    <video id="skitVideo" src="skit.mp4"></video>
</div>

<script>
window.addEventListener("load", () => {
    document.getElementById("workButton").classList.add("show");
});

const button = document.getElementById("workButton");
const videoContainer = document.getElementById("videoContainer");
const video = document.getElementById("skitVideo");

button.addEventListener("mouseenter", () => {
    videoContainer.style.display = "flex";
    video.play();
});

button.addEventListener("mouseleave", () => {
    video.pause();
    video.currentTime = 0;
    videoContainer.style.display = "none";
});
</script>

</body>
</html>
