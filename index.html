<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portfolio</title>

<style>
body {
    margin: 0;
    height: 100vh;

    background-color: #2b0a3d;

    background-image:
        linear-gradient(rgba(255,255,255,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.07) 1px, transparent 1px);

    background-size: 60px 60px;

    font-family: Arial, sans-serif;
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
}

h1 {
    font-size: 40px;
    margin: 0;
}

p {
    opacity: 0.8;
}

#workButton {
    margin-top: 30px;
    position: relative;
    padding: 14px 28px;
    font-size: 18px;

    color: white;
    background: transparent;

    border: 2px solid #b84dff;
    border-radius: 8px;

    cursor: pointer;
    overflow: hidden;

    box-shadow: 0 0 15px #b84dff;
    transition: 0.3s ease;
}

#workButton:hover {
    box-shadow: 0 0 25px #b84dff, 0 0 40px #b84dff;
    transform: scale(1.05);
}

#workVideo {
    position: absolute;
    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    object-fit: cover;

    z-index: 0;
    display: none;
}

.button-text {
    position: relative;
    z-index: 1;
}
</style>
</head>

<body>

<div class="container">
    <h1>Your Name</h1>
    <p>Developer • Creator • Builder</p>

    <button id="workButton">
        <video id="workVideo" src="skit.mp4" muted></video>
        <span class="button-text">Work →</span>
    </button>
</div>

<script>
const button = document.getElementById("workButton");
const video = document.getElementById("workVideo");

button.addEventListener("mouseenter", () => {
    video.style.display = "block";
    video.play();
});

button.addEventListener("mouseleave", () => {
    video.pause();
    video.currentTime = 0;
    video.style.display = "none";
});
</script>

</body>
</html>
